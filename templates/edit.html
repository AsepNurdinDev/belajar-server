<script src="https://cdn.tailwindcss.com"></script>

<h1 class="text-xl font-bold text-center mt-10">Edit User</h1>

<form action="/update-user" method="POST" class="max-w-md mx-auto mt-5">
    <input type="hidden" name="id" value="{{.ID}}">

    <input name="username" value="{{.Username}}" class="border p-2 w-full mb-3">
    <input name="email" value="{{.Email}}" class="border p-2 w-full mb-3">

    <button class="bg-blue-500 text-white px-4 py-2 w-full">Update</button>
</form>
