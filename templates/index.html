<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang di Portal Kami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-200 rounded-full blur-[120px] opacity-50"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-200 rounded-full blur-[120px] opacity-50"></div>

    <div class="relative z-10 w-full max-w-md p-8">
        <div class="bg-white/80 backdrop-blur-xl border border-white p-10 rounded-3xl shadow-2xl text-center transition-all hover:shadow-indigo-100">
            
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-2xl shadow-lg mb-8 rotate-3 hover:rotate-0 transition-transform duration-300">
                <i class="fas fa-rocket text-white text-3xl"></i>
            </div>

            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-3">
                Halo, <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500">Selamat Datang</span>
            </h1>
            
            <p class="text-slate-500 mb-10 leading-relaxed">
                Kelola data sistem informasi Anda dengan lebih mudah, cepat, dan aman dalam satu platform terintegrasi.
            </p>

            <div class="flex flex-col space-y-4">
                <a href="/login" class="group relative flex items-center justify-center bg-indigo-600 text-white px-8 py-4 rounded-2xl font-semibold shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all duration-200">
                    Masuk Sekarang
                    <i class="fas fa-arrow-right ml-2 text-sm opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
                </a>
                
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-sm">atau</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>

                <a href="/register" class="flex items-center justify-center bg-white border-2 border-slate-100 text-slate-700 px-8 py-4 rounded-2xl font-semibold hover:border-indigo-100 hover:bg-indigo-50/50 transition-all duration-200">
                    Daftar Akun Baru
                </a>
            </div>

            <p class="mt-8 text-xs text-slate-400 uppercase tracking-widest font-medium">
                Powered by Go & Nginx
            </p>
        </div>
    </div>

</body>
</html>
