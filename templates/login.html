<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | Tenangin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mobile-menu-open { display: block !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-100 rounded-full blur-[120px] opacity-60"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-teal-100 rounded-full blur-[120px] opacity-60"></div>
    </div>

    <div class="relative z-10 flex-1 flex items-center justify-center p-6 pt-28">
        <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-white p-10 rounded-[2.5rem] shadow-2xl">
            
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-emerald-600 to-teal-400 rounded-2xl shadow-lg mb-4 text-white">
                    <i class="fas fa-user-lock text-2xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-800">Masuk Akun</h2>
                <p class="text-slate-500 mt-2 text-sm">Lanjutkan perjalanan tenangmu</p>
            </div>

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-300">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" name="email" placeholder="nama@email.com" 
                            class="w-full pl-11 pr-4 py-3 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-300 shadow-sm" required>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2 ml-1">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-xs font-semibold text-emerald-600 hover:text-emerald-800">Lupa?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-300">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" placeholder="••••••••" 
                            class="w-full pl-11 pr-4 py-3 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all placeholder:text-slate-300 shadow-sm" required>
                    </div>
                </div>

                <div class="flex items-center ml-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-emerald-600 border-slate-200 rounded focus:ring-emerald-500">
                    <label for="remember" class="ml-2 text-sm text-slate-500">Ingat perangkat ini</label>
                </div>

                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-100 hover:bg-emerald-600 hover:-translate-y-1 transition-all duration-300 mt-2">
                    Masuk Sekarang
                </button>
            </form>

            <p class="text-center text-slate-500 mt-8 text-sm">
                Baru di Tenangin? 
                <a href="/register" class="text-emerald-600 font-bold hover:underline">Buat akun</a>
            </p>
        </div>
    </div>

</body>
</html>
